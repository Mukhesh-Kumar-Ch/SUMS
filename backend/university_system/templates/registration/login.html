{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 220px);">
    <div class="col-12 col-md-7 col-lg-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-4 p-md-5">
          <h1 class="card-title fs-3 text-center mb-1">University Management System</h1>
          <p class="text-muted text-center mb-4">Sign in with your registered email and password.</p>

          <form method="post" novalidate>
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next|default:'' }}">

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                id="email"
                name="email"
                type="email"
                class="form-control"
                value="{{ email|default:'' }}"
                required
              />
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <div class="input-group">
                <input
                  id="password"
                  name="password"
                  type="password"
                  class="form-control"
                  required
                />
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  id="toggle-password"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
              Login
            </button>
          </form>

          <p class="text-muted text-center mt-3 mb-0 small">Use Show to verify your password before submitting.</p>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
  <script>
    const passwordInput = document.getElementById("password");
    const toggleButton = document.getElementById("toggle-password");

    toggleButton.addEventListener("click", function () {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      toggleButton.textContent = isHidden ? "Hide" : "Show";
      toggleButton.setAttribute(
        "aria-label",
        isHidden ? "Hide password" : "Show password"
      );
    });
  </script>
{% endblock %}
