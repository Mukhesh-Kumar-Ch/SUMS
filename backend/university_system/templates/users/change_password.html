{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
  <div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 220px);">
    <div class="col-12 col-md-7 col-lg-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-4 p-md-5">
          <h1 class="card-title fs-3 text-center mb-1">Change Password</h1>
          <p class="text-muted text-center mb-4">Update your account password</p>

          <form method="post" novalidate>
            {% csrf_token %}

            <div class="mb-3">
              <label for="old_password" class="form-label">Current Password</label>
              <div class="input-group">
                <input
                  id="old_password"
                  name="old_password"
                  type="password"
                  class="form-control"
                  required
                />
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  data-toggle-target="old_password"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>

            <div class="mb-3">
              <label for="new_password" class="form-label">New Password</label>
              <div class="input-group">
                <input
                  id="new_password"
                  name="new_password"
                  type="password"
                  class="form-control"
                  required
                />
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  data-toggle-target="new_password"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>

            <div class="mb-3">
              <label for="confirm_password" class="form-label">Confirm New Password</label>
              <div class="input-group">
                <input
                  id="confirm_password"
                  name="confirm_password"
                  type="password"
                  class="form-control"
                  required
                />
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  data-toggle-target="confirm_password"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
              Change Password
            </button>

            <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100 py-2 fw-semibold mt-2">
              Cancel
            </a>
          </form>

          <p class="text-muted text-center mt-3 mb-0 small">
            Your password will be securely hashed before storage.
          </p>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
  <script>
    document.querySelectorAll('[data-toggle-target]').forEach(button => {
      button.addEventListener('click', function () {
        const targetId = this.getAttribute('data-toggle-target');
        const input = document.getElementById(targetId);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? 'Hide' : 'Show';
        this.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
      });
    });
  </script>
{% endblock %}
